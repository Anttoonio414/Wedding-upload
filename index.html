<!DOCTYPE html>
<html>
<head>
  <title>Wedding Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Драгана & Стефан ❤️</h1>
    <div class="divider"></div>
    <p class="quote">
      „Љубовта е составена од една душа која живее во две тела.“
    </p>
    <p>Помогнете ни да ги зачуваме најубавите моменти од оваа вечер 📸</p>
    <input type="file" id="fileInput" multiple onchange="updateFileCount()" style="display:none;">
    <input type="text" id="nameInput" placeholder="Вашето име (опционално)" class="text-input">
    <textarea id="messageInput" placeholder="Напишете порака или опишете го моментот..." class="text-input"></textarea>
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">
      Изберете фотографии / видеа
    </button>
    <br>
    <div class="file-count" id="fileCount">
      Нема прикачено датотеки
    </div>
    <button onclick="upload()">Прикачи спомени</button>
    <div id="progressContainer">
      <div id="progressBar">0%</div>
    </div>
    <p id="status"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
